<!DOCTYPE html>
<html>
<head>
    <title>YouTube Downloader</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        input[type="url"] { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #ff0000; color: white; padding: 12px 24px; border: none; cursor: pointer; }
        .flash { color: red; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🎥 YouTube Video Downloader</h1>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="POST" action="/download">
        <input type="url" name="url" placeholder="Paste YouTube URL here..." required>
        <br>
        <button type="submit">📥 Download MP4</button>
    </form>
    
    <hr>
    <h3>🔄 Convert to MP3</h3>
    <form method="POST" action="/convert" enctype="multipart/form-data">
        <input type="file" name="file" accept="video/*" required>
        <br>
        <button type="submit">🎵 Convert to MP3</button>
    </form>
</body>
</html>
